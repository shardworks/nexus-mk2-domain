- id: dispatcher
  title: Dispatcher
  requirements:
    - id: command-line-dispatch
      title: Command-Line Dispatch
      status: draft
      invariants:
        - Every Operator registered with the Dispatcher can be invoked from the
          command line by name
        - The Dispatcher provides a single entry point for dispatching Operations
        - Dispatching an Operation causes its declared Effects to occur

    - id: discoverability
      title: Operation Discoverability
      status: draft
      invariants:
        - Available Operations and their Operators are documented in a way that
          is accessible to both humans and agents
        - Agent instructions include how to dispatch Operations
      notes:
        - type: context
          body: >-
            This could be a README, a help command, or documentation in
            CLAUDE.md. The mechanism is an implementation detail; the
            requirement is that the information is findable.

- id: auditor
  title: Requirements Auditor
  requirements:
    - id: coverage
      title: Audit Coverage
      status: deprecated
      invariants:
        - Every registered Requirement receives a verdict (pass, fail, or unknown)
          in every audit
        - Every Artifact<AuditReport> contains a Verdict for every registered
          Requirement
      notes:
        - type: caveat
          body: >-
            Deprecated. Superseded by auditor/single-requirement — the
            Auditor evaluates one Requirement per invocation rather than
            producing a comprehensive report.

    - id: single-requirement
      title: Single Requirement Scope
      status: draft
      invariants:
        - Each invocation of the Auditor evaluates exactly one Requirement
        - Each invocation produces exactly one Artifact<Assessment>
        - The Auditor receives the Requirement to evaluate as input — it
          does not select requirements or check for staleness

    - id: read-only
      title: Auditor Is Read-Only
      status: draft
      invariants:
        - The Auditor does not modify any project or domain Repository files
        - The only files the Auditor creates are its output artifacts

    - id: report-conformance
      title: Audit Report Conformance
      status: deprecated
      invariants:
        - Every Artifact<AuditReport> in the store conforms to the AuditReport
          schema
        - Every Verdict in an AuditReport includes at least one evidence string
      notes:
        - type: caveat
          body: >-
            Deprecated. The Auditor no longer produces Artifact<AuditReport>.
            Assessments are the primary audit output. Evidence requirements
            are covered by assessments/conformance.

    - id: assessment-production
      title: Assessment Production
      status: draft
      invariants:
        - The Assessment produced by each invocation records the current
          implementation and domain Repository HEAD commit hashes at the
          time of evaluation
        - The Assessment's requirementId matches the Requirement the
          Auditor was invoked to evaluate

- id: assessments
  title: Assessments
  requirements:
    - id: freshness
      title: Assessment Freshness
      status: draft
      invariants:
        - Every registered Requirement has at least one Artifact<Assessment>
        - An Assessment is stale when its projectCommit or domainCommit does
          not match the current HEAD of the respective Repository
        - Stale Assessments are reassessed in the next audit cycle

    - id: conformance
      title: Assessment Conformance
      status: draft
      invariants:
        - Every Artifact<Assessment> in the store conforms to the Assessment
          schema
        - Every Assessment references a valid commit hash from the implementation
          and domain Repositories

- id: builder
  title: Builder
  requirements:
    - id: single-task
      title: Single Task Scope
      status: draft
      invariants:
        - Each invocation of the Builder addresses at most one failing Requirement
        - Each build produces exactly one atomic commit

    - id: traceability
      title: Build Traceability
      status: draft
      invariants:
        - Every Builder commit subject matches the format
          "implements <requirement-id>"
        - Every Builder commit body describes what was changed and why
        - Every build produces an Artifact<BuildResult> linking the commit to the
          Artifact<Assessment> and Requirement that triggered it

    - id: boundaries
      title: Builder Boundaries
      status: draft
      invariants:
        - The Builder does not modify domain Repository files (requirements,
          ontology)
        - The Builder only acts on current Assessments where result is fail
        - The Builder does not act on an Artifact<Assessment> that already has
          a corresponding Artifact<BuildResult>
        - If no Assessments are failing, the Builder exits cleanly without
          making changes

    - id: feature-locking
      title: Feature Locking
      status: draft
      invariants:
        - At most one Builder instance is implementing changes for a given
          Feature at any time
        - A Builder must acquire a lock on a Feature before beginning work and
          release it when its commit is complete
        - If a Feature lock is held by another Builder, the Builder selects a
          different failing Requirement from an unlocked Feature or exits
          cleanly
      notes:
        - type: rationale
          body: >-
            Requirements within the same Feature tend to touch overlapping
            files. Allowing concurrent Builders on the same Feature creates
            merge conflicts. Feature-level locking serializes work within a
            Feature while allowing parallelism across Features.

- id: audit-loop
  title: Audit Loop
  requirements:
    - id: reconciliation
      title: Audit Reconciliation
      status: draft
      invariants:
        - The audit loop runs continuously without manual intervention
        - Each iteration identifies one Requirement with a stale or missing
          Assessment and dispatches the Auditor to evaluate it
        - After each Auditor invocation, the evaluated Requirement has a
          current Assessment whose projectCommit and domainCommit match
          the current HEAD

    - id: priority
      title: Assessment Priority
      status: draft
      invariants:
        - Requirements with no existing Assessment are evaluated before
          Requirements with a stale passing Assessment
        - Requirements whose most recent Assessment has result fail are
          evaluated before Requirements with a stale passing Assessment
      notes:
        - type: rationale
          body: >-
            New requirements and known failures are more likely to have
            actionable outcomes. Prioritizing them over re-checking
            previously passing requirements reduces time to first
            Assessment for new work and keeps the build loop fed with
            current failure data.

    - id: hot-reload
      title: Audit Loop Hot Reload
      status: draft
      invariants:
        - Changes to operator agent instructions are picked up on the next
          iteration without manual restart
        - Changes to the loop script itself are picked up on the next
          iteration without manual restart
      notes:
        - type: context
          body: >-
            Agent instruction changes are naturally picked up because each
            iteration spawns a fresh process that reads the instructions file.
            Loop script changes require the loop to detect that its own source
            has changed and re-exec itself.

- id: build-loop
  title: Build Loop
  requirements:
    - id: continuous-operation
      title: Continuous Operation
      status: deprecated
      invariants:
        - The system continuously audits and builds without manual intervention
        - The latest Artifact<AuditReport> is newer than the most recent
          implementation Repository commit if that commit is more than
          20 minutes old
        - All Requirements with status "active" have a passing Verdict in the
          latest Artifact<AuditReport>
      notes:
        - type: caveat
          body: >-
            Deprecated. Superseded by audit-loop/reconciliation and
            build-loop/reconciliation which decouple audit and build into
            independent reconciliation loops.

    - id: change-detection
      title: Change Detection
      status: deprecated
      invariants:
        - The system does not re-audit when neither the implementation nor domain
          Repository has new commits since the last audit
      notes:
        - type: caveat
          body: >-
            Deprecated. Superseded by assessment freshness — the audit loop
            uses Assessment staleness (commit mismatch) rather than explicit
            change detection.

    - id: reconciliation
      title: Build Reconciliation
      status: draft
      invariants:
        - The build loop runs continuously without manual intervention
        - Each iteration identifies current Assessments with result fail and
          invokes the Builder to address one
        - The build loop respects feature locking — it does not invoke a
          Builder for a Feature that is already locked
        - The build loop only acts on Assessments whose projectCommit matches
          the current implementation Repository HEAD — stale Assessments are
          skipped
      notes:
        - type: rationale
          body: >-
            Because audit and build run concurrently, an Assessment's
            projectCommit may refer to an earlier commit than the current
            HEAD. Acting on such an Assessment risks redundant or conflicting
            builds — the code may already satisfy the Requirement. The
            commit-gating invariant ensures builders only act on Assessments
            that reflect the current state of the codebase.

    - id: hot-reload
      title: Build Loop Hot Reload
      status: draft
      invariants:
        - Changes to operator agent instructions are picked up on the next
          iteration without manual restart
        - Changes to the loop script itself are picked up on the next
          iteration without manual restart
      notes:
        - type: context
          body: >-
            Agent instruction changes are naturally picked up because each
            iteration spawns a fresh process that reads the instructions file.
            Loop script changes require the loop to detect that its own source
            has changed and re-exec itself.

- id: artifact-cli
  title: Artifact CLI
  requirements:
    - id: list-artifacts
      title: List Artifacts
      status: draft
      invariants:
        - The CLI can list all Artifacts of a given ArtifactTypeName
        - Listed Artifacts are displayed with their id, createdAt, and type
        - Results are ordered by createdAt descending (most recent first)

    - id: show-artifact
      title: Show Artifact
      status: draft
      invariants:
        - The CLI can display the full content of an Artifact given its type
          and id
        - Output is valid JSON matching the Artifact schema for that type

    - id: latest-artifact
      title: Latest Artifact
      status: draft
      invariants:
        - The CLI can retrieve the most recent Artifact of a given
          ArtifactTypeName
        - When no Artifacts of the requested type exist, the CLI exits with
          a non-zero status and a clear message

    - id: store-artifact
      title: Store Artifact
      status: draft
      invariants:
        - The CLI accepts a JSON Artifact on stdin and stores it in the
          appropriate ArtifactStore based on its type field
        - The stored Artifact is retrievable via the show command using
          its type and id
        - The CLI validates that the input contains required Artifact
          fields (type, id, createdAt, content) before storing

    - id: delete-artifact
      title: Delete Artifact
      status: draft
      invariants:
        - The CLI can delete an Artifact given its type and id
        - After deletion, the Artifact is no longer retrievable via
          show, list, or latest
        - Deletion of a non-existent Artifact exits with a non-zero
          status and a clear message

    - id: exclusive-access
      title: Exclusive Artifact Access
      status: draft
      invariants:
        - All artifact reads and writes by agents go through the artifact
          CLI — agents do not reference artifact storage paths directly
        - Agent instructions reference artifact CLI commands, not
          filesystem paths, for artifact operations

- id: artifact-persistence
  title: Artifact Persistence
  requirements:
    - id: durable-storage
      title: Durable Artifact Storage
      status: draft
      invariants:
        - Artifacts stored in a persistent ArtifactStore are committed and
          pushed to the NexusArtifactsRepository by the artifact CLI as
          part of the store operation
        - Artifacts in the NexusArtifactsRepository survive workspace
          teardown and are available in subsequent workspaces
        - Artifacts stored in a non-persistent ArtifactStore are written to
          workspace-local storage only

    - id: restoration
      title: Artifact Restoration
      status: draft
      invariants:
        - When a workspace starts, persistent Artifacts from the
          NexusArtifactsRepository are available to the artifact CLI
          for retrieval
        - The artifact CLI does not require manual sync steps to access
          previously persisted Artifacts

- id: environment
  title: Runtime Environment
  requirements:
    - id: compliance
      title: Environment Contract Compliance
      status: draft
      invariants:
        - Implementations must not contain hardcoded values for anything
          declared in NexusEnvironment — they must read from the
          environment at runtime
        - Agent instructions must not contain hardcoded values for
          anything declared in NexusEnvironment — they must reference
          environment variables by name
      notes:
        - type: rationale
          body: >-
            NexusEnvironment defines the runtime guarantees a workspace
            provides. If an implementation hardcodes a path or URL that
            the environment contract makes available as a variable, it
            is coupled to a specific workspace layout rather than the
            contract. This is incorrect even if it happens to work.
        - type: context
          body: >-
            This requirement is global — it applies to all scripts,
            agent instructions, and operator implementations, not to
            a single feature.

- id: scribe-loop
  title: Scribe Loop
  requirements:
    - id: reconciliation
      title: Scribe Reconciliation
      status: draft
      invariants:
        - Each invocation lists all Artifact<StagedTranscript> entries
          via the artifact CLI and processes each one
        - For each Artifact<StagedTranscript>, the loop dispatches the
          Scribe to produce an Artifact<SessionDoc>, then performs
          transcript ingestion
        - If no Artifact<StagedTranscript> entries exist, the loop
          exits cleanly without dispatching the Scribe
      notes:
        - type: context
          body: >-
            Unlike the audit and build loops, the scribe loop is
            invoked on demand rather than running continuously.
            Transcript capture is infrequent (only interactive
            sessions) and does not require continuous polling.

    - id: failure-isolation
      title: Scribe Failure Isolation
      status: draft
      invariants:
        - A failed Scribe invocation does not prevent processing of
          remaining Artifact<StagedTranscript> entries
        - Failed Artifact<StagedTranscript> entries are not deleted —
          they remain in the staged-transcript store for retry

- id: documentation-pipeline
  title: Documentation Pipeline
  requirements:
    - id: transcript-capture
      title: Transcript Capture
      status: active
      invariants:
        - Session transcripts are automatically captured during interactive
          SubagentType sessions
        - Transcripts are not captured for autonomous SubagentTypes
        - A pre-compaction snapshot is saved before context compaction occurs
        - Captured transcripts are stored as Artifact<StagedTranscript> via
          the artifact CLI

    - id: transcript-ingestion
      title: Transcript Ingestion
      status: draft
      invariants:
        - After the Scribe produces an Artifact<SessionDoc>, the
          corresponding Artifact<StagedTranscript> is promoted to a
          durable Artifact<Transcript> via the artifact CLI
        - The original Artifact<StagedTranscript> is deleted after
          successful ingestion
        - Only Artifact<StagedTranscript> entries are candidates for
          processing — the staged-transcript store is the sole queue
          of unprocessed transcripts
      notes:
        - type: rationale
          body: >-
            The staged-transcript store is non-persistent (workspace-local),
            so hooks can write quickly without git operations. The scribe
            workflow promotes the raw transcript to durable storage only
            after it has been successfully processed, ensuring the
            persistent transcript store contains only completed work.

    - id: scribe
      title: Scribe
      status: active
      invariants:
        - Each invocation of the Scribe consumes one Artifact<StagedTranscript>
          and produces one Artifact<SessionDoc>
        - Every Artifact<SessionDoc> conforms to the SessionDoc schema
        - Scribe output is grounded in transcript content — no invented content

    - id: herald
      title: Herald
      status: active
      invariants:
        - Each invocation of the Herald produces one Artifact<Publication>
        - Every Artifact<Publication> conforms to the Publication schema
        - Herald output is grounded in session documentation — no invented
          content
        - Publications are written for an outside audience
