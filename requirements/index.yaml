- id: dispatcher
  title: Dispatcher
  requirements:
    - id: command-line-dispatch
      title: Command-Line Dispatch
      status: draft
      invariants:
        - Every Operator registered with the Dispatcher can be invoked from the
          command line by name
        - The Dispatcher provides a single entry point for dispatching Operations
        - Dispatching an Operation causes its declared Effects to occur

    - id: discoverability
      title: Operation Discoverability
      status: draft
      invariants:
        - Available Operations and their Operators are documented in a way that
          is accessible to both humans and agents
        - Agent instructions include how to dispatch Operations
      notes:
        - type: context
          body: >-
            This could be a README, a help command, or documentation in
            CLAUDE.md. The mechanism is an implementation detail; the
            requirement is that the information is findable.

- id: auditor
  title: Requirements Auditor
  requirements:
    - id: coverage
      title: Audit Coverage
      status: draft
      invariants:
        - Every registered Requirement receives a verdict (pass, fail, or unknown)
          in every audit
        - Every Artifact<AuditReport> contains a Verdict for every registered
          Requirement

    - id: read-only
      title: Auditor Is Read-Only
      status: draft
      invariants:
        - The Auditor does not modify any project or domain Repository files
        - The only files the Auditor creates are its output artifacts

    - id: report-conformance
      title: Audit Report Conformance
      status: draft
      invariants:
        - Every Artifact<AuditReport> in the store conforms to the AuditReport
          schema
        - Every Verdict in an AuditReport includes at least one evidence string

    - id: assessment-production
      title: Assessment Production
      status: draft
      invariants:
        - Every audit produces one Artifact<Assessment> per evaluated Requirement
        - Each Assessment records the current implementation and domain Repository
          HEAD commit hashes at the time of evaluation
      notes:
        - type: context
          body: >-
            Assessments are the per-requirement, commit-anchored complement to
            the bulk AuditReport. The Auditor produces both: an AuditReport for
            summary consumption, and individual Assessments for freshness
            tracking and incremental reassessment.

- id: assessments
  title: Assessments
  requirements:
    - id: freshness
      title: Assessment Freshness
      status: draft
      invariants:
        - Every registered Requirement has at least one Artifact<Assessment>
        - An Assessment is stale when its projectCommit or domainCommit does
          not match the current HEAD of the respective Repository
        - Stale Assessments are reassessed in the next audit cycle
      notes:
        - type: context
          body: >-
            "Current" means the most recent Artifact<Assessment> for a given
            requirementId. A stale Assessment triggers reassessment — the
            auditor must produce a fresh Assessment against the current HEAD.
            Historical Assessments are retained but not subject to the
            freshness invariant.

    - id: conformance
      title: Assessment Conformance
      status: draft
      invariants:
        - Every Artifact<Assessment> in the store conforms to the Assessment
          schema
        - Every Assessment references a valid commit hash from the implementation
          and domain Repositories

- id: builder
  title: Builder
  requirements:
    - id: single-task
      title: Single Task Scope
      status: draft
      invariants:
        - Each invocation of the Builder addresses at most one failing Requirement
        - Each build produces exactly one atomic commit

    - id: traceability
      title: Build Traceability
      status: draft
      invariants:
        - Every Builder commit subject matches the format
          "implements <requirement-id>"
        - Every Builder commit body describes what was changed and why
        - Every build produces an Artifact<BuildResult> linking the commit to the
          Artifact<AuditReport> and Requirement that triggered it

    - id: boundaries
      title: Builder Boundaries
      status: draft
      invariants:
        - The Builder does not modify domain Repository files (requirements,
          ontology)
        - The Builder does not act on an Artifact<AuditReport> that already has
          a corresponding Artifact<BuildResult>
        - If no Requirements are failing, the Builder exits cleanly without
          making changes

    - id: feature-locking
      title: Feature Locking
      status: draft
      invariants:
        - At most one Builder instance is implementing changes for a given
          Feature at any time
        - A Builder must acquire a lock on a Feature before beginning work and
          release it when its commit is complete
        - If a Feature lock is held by another Builder, the Builder selects a
          different failing Requirement from an unlocked Feature or exits
          cleanly
      notes:
        - type: rationale
          body: >-
            Requirements within the same Feature tend to touch overlapping
            files. Allowing concurrent Builders on the same Feature creates
            merge conflicts. Feature-level locking serializes work within a
            Feature while allowing parallelism across Features.

- id: build-loop
  title: Build Loop
  requirements:
    - id: continuous-operation
      title: Continuous Operation
      status: draft
      invariants:
        - The system continuously audits and builds without manual intervention
        - The latest Artifact<AuditReport> is newer than the most recent
          implementation Repository commit if that commit is more than
          20 minutes old
        - All Requirements with status "active" have a passing Verdict in the
          latest Artifact<AuditReport>
      notes:
        - type: caveat
          body: >-
            The "all active requirements pass" invariant describes the system's
            target state, not a guarantee. A newly added Requirement will fail
            until the Builder addresses it. The invariant is that the system
            converges toward this state autonomously.

    - id: change-detection
      title: Change Detection
      status: draft
      invariants:
        - The system does not re-audit when neither the implementation nor domain
          Repository has new commits since the last audit

- id: artifact-cli
  title: Artifact CLI
  requirements:
    - id: list-artifacts
      title: List Artifacts
      status: draft
      invariants:
        - The CLI can list all Artifacts of a given ArtifactTypeName
        - Listed Artifacts are displayed with their id, createdAt, and type
        - Results are ordered by createdAt descending (most recent first)
      notes:
        - type: context
          body: >-
            This is the primary tool for humans and agents to discover what
            Artifacts exist without knowing the storage layout. The storage
            mechanism is an implementation detail — the CLI abstracts over it.

    - id: show-artifact
      title: Show Artifact
      status: draft
      invariants:
        - The CLI can display the full content of an Artifact given its type
          and id
        - Output is valid JSON matching the Artifact schema for that type

    - id: latest-artifact
      title: Latest Artifact
      status: draft
      invariants:
        - The CLI can retrieve the most recent Artifact of a given
          ArtifactTypeName
        - When no Artifacts of the requested type exist, the CLI exits with
          a non-zero status and a clear message

- id: documentation-pipeline
  title: Documentation Pipeline
  requirements:
    - id: transcript-capture
      title: Transcript Capture
      status: active
      invariants:
        - Session transcripts are automatically captured during interactive
          SubagentType sessions
        - Transcripts are not captured for autonomous SubagentTypes
        - A pre-compaction snapshot is saved before context compaction occurs

    - id: scribe
      title: Scribe
      status: active
      invariants:
        - Each invocation of the Scribe consumes one Transcript and produces
          one Artifact<SessionDoc>
        - Every Artifact<SessionDoc> conforms to the SessionDoc schema
        - Scribe output is grounded in transcript content — no invented content

    - id: herald
      title: Herald
      status: active
      invariants:
        - Each invocation of the Herald produces one Artifact<Publication>
        - Every Artifact<Publication> conforms to the Publication schema
        - Herald output is grounded in session documentation — no invented
          content
        - Publications are written for an outside audience
